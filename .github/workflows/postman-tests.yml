name: Run Postman GraphQL API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# 👇 Opt into Node 24 (fix warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  newman-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"   # safe now, will still work

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Tests (GraphQL API)
        run: |
          newman run "Dummy Graphql Api automation Postman.postman_collection.json" \
          -e "Dev Env.postman_environment.json" \
          --reporters cli,html \
          --reporter-html-export newman-report.html

      - name: Upload Newman Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-test-report
          path: newman-report.html
